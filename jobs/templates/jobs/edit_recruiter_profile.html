{% extends 'base.html' %}

{% block content %}

<style>

body{
background:#f4f6f9;
font-family:Arial, sans-serif;
}

.profile-card{
border:none;
border-radius:12px;
}

.form-title{
font-weight:600;
}

.section-divider{
border-top:1px solid #e0e0e0;
margin:25px 0;
}

input,
textarea,
select{
width:100%;
padding:10px;
border:1px solid #ced4da;
border-radius:6px;
}

input:focus,
textarea:focus,
select:focus{
outline:none;
border-color:#0d6efd;
box-shadow:0 0 5px rgba(13,110,253,0.3);
}

</style>

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-8">

<div class="card profile-card shadow-sm p-4">

<h2 class="text-center text-primary form-title mb-4">

Edit Recruiter Profile

</h2>

{% if form.errors %}

<div class="alert alert-danger">

{{ form.errors }}

</div>

{% endif %}

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<!-- COMPANY DETAILS -->

<h5 class="mb-4 text-secondary">

Company Verification

</h5>

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

Company Website

</label>

{{ form.company_website }}

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

Phone Number

</label>

{{ form.phone }}

</div>

<div class="col-12 mb-4">

<label class="form-label fw-semibold">

Company Description

</label>

{{ form.company_description }}

</div>

</div>

<div class="section-divider"></div>

<!-- COMPANY VERIFICATION -->

<h5 class="text-muted mb-3">

Verification Details

</h5>

<div class="mb-4">

<label class="form-label">

Upload Company Certificate / Proof

</label>

<input type="file"
       name="company_certificate"
       class="form-control">

</div>

<!-- BUTTONS -->

<div class="d-flex gap-2">

<button type="submit"
        class="btn btn-primary">

Save Changes

</button>

<a href="{% url 'recruiter_dashboard' %}"
   class="btn btn-outline-secondary">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
